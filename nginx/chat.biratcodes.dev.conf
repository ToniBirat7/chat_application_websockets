# Add this file to /etc/nginx/sites-available/ on the VM
# Then: ln -s /etc/nginx/sites-available/chat.biratcodes.dev.conf /etc/nginx/sites-enabled/
# Get SSL cert: certbot certonly --nginx -d chat.biratcodes.dev
# Then: nginx -t && nginx -s reload

server {
    listen 80;
    server_name chat.biratcodes.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name chat.biratcodes.dev;

    ssl_certificate     /etc/letsencrypt/live/chat.biratcodes.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.biratcodes.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    client_max_body_size 10M;

    # Frontend (React SPA served by nginx:alpine container)
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # Backend REST API
    location ~ ^/(api|auth|health)/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass              http://127.0.0.1:3001;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_read_timeout      86400s;
        proxy_send_timeout      86400s;
    }
}
