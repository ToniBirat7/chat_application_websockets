# Add this file to /etc/nginx/sites-available/ on the VM
# Then: ln -s /etc/nginx/sites-available/chat.biratcodes.dev.conf /etc/nginx/sites-enabled/
# Then: nginx -t && nginx -s reload
#
# Note: Cloudflare handles TLS termination — origin listens on port 80 only.

server {
    listen 80;
    server_name chat.biratcodes.dev;

    client_max_body_size 10M;

    # Frontend (React SPA served by nginx:alpine container on 3002)
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Backend REST API (on 3003)
    location ~ ^/(api|auth|health)/ {
        proxy_pass         http://127.0.0.1:3003;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
    }

    # WebSocket (Socket.IO on 3003)
    location /socket.io/ {
        proxy_pass              http://127.0.0.1:3003;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout      86400s;
        proxy_send_timeout      86400s;
    }
}
